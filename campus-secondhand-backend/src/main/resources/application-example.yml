server:
  port: 18081
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
  tomcat:
    max-http-form-post-size: -1
    max-swallow-size: -1
    threads:
      max: 300
      min-spare: 20
    accept-count: 200
    accesslog:
      enabled: true
      directory: logs
      rotate: true
      prefix: access_log
      suffix: .log
      pattern: '%h %l %u %t "%r" %s %b %D'

spring:
  application:
    name: campus-secondhand-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_trade?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: YOUR_MYSQL_USERNAME
    password: YOUR_MYSQL_PASSWORD
  servlet:
    multipart:
      max-file-size: 4GB
      max-request-size: 4GB

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: "CHANGE_ME_CHANGE_ME_CHANGE_ME_CHANGE_ME_CHANGE_ME_32_BYTES_MIN"
    expire-seconds: 604800
  share-gate:
    passphrase: "CHANGE_ME_WITH_A_STRONG_12_PLUS_CHAR_SHARE_GATE_SECRET"
    token-expire-seconds: 1800
    verify-window-seconds: 60
    verify-max-requests: 8
    fail-max-attempts: 4
    fail-ban-seconds: 1800
    cookie-secure: true
  upload:
    dir: uploads
    max-bytes: 4294967296
    chunk-max-bytes: 67108864
  cleanup:
    cron: "0 */10 * * * *"
    chunk-ttl-seconds: 21600
    temp-ttl-seconds: 21600
    orphan-min-age-seconds: 3600
    max-delete-per-run: 200
